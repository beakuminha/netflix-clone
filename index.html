<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Netflix Clone</h1>
        <button id="themeToggle" aria-label="Alternar tema">🌙</button>
    </header>
    <main>
        <section aria-labelledby="profile-heading">
            <h2 style="text-align: center;" id="profile-heading">Quem está assistindo?</h2>
            <div class="profiles">
                <article class="profile" id="profile1" aria-label="Perfil 1">
                    <img src="/assets/perfil-1.jpg" alt="Um personagem masculino estilizado no estilo de animação stop-motion (semelhante ao trabalho de Tim Burton). O personagem tem pele pálida, olhos grandes e arregalados, cabelos roxos bagunçados e usa um monóculo.">
                    <p>Bea</p>
                </article>
                <article class="profile" aria-label="Perfil 2">
                    <img src="/assets/perfil-2.jpg" alt="Um boné de tecido cinza e aba azul com a letra "M" bordada, decorado com retalhos coloridos e botões amarelos, posicionado em um cenário lúdico e sombrio de animação stop-motion.">
                    <p>Yumi</p>
                </article>
                <article class="profile" aria-label="Perfil 3">
                    <img src="/assets/perfil3.jpg" alt="Um simpático rato preto de óculos estuda programação em um quarto detalhado, sentado sobre uma pilha de livros técnicos enquanto digita em seu computador em um estilo cartoon.">
                    <p>Teresa</p>
                </article>
                <article class="profile" aria-label="Perfil 4">
                    <img src="/assets/perfil-4.jpg" alt="Um zumbi programador em foto de identificação policial cercado por livros técnicos.">
                    <p>Igor</p>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Netflix</p>
    </footer>
    <script src="/script.js"></script>
</body>
</html>
